<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BM INSIGHTS | Certificate of Completion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .certificate-container {
            width: 800px;
            padding: 50px;
            background: white;
            border: 15px solid #1a1a2e; /* Dark border matching your theme */
            outline: 5px solid #f1c40f; /* Gold inner border */
            outline-offset: -20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }
        .cert-logo {
            width: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        .cert-title {
            font-family: 'Playfair Display', serif;
            font-size: 45px;
            color: #1a1a2e;
            margin: 10px 0;
            text-transform: uppercase;
        }
        .cert-subtitle {
            font-size: 20px;
            color: #555;
            margin-bottom: 30px;
        }
        .student-name {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            color: #f1c40f; /* Gold text for the name */
            border-bottom: 2px solid #ddd;
            display: inline-block;
            padding: 0 40px 10px;
            margin-bottom: 30px;
            min-width: 300px;
        }
        .cert-course {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 40px;
        }
        .cert-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
            padding: 0 50px;
        }
        .signature-line {
            border-top: 2px solid #1a1a2e;
            width: 200px;
            padding-top: 10px;
            font-weight: 600;
        }
        .print-btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        /* Hide the print button when actually printing */
        @media print {
            .print-btn { display: none; }
            body { background: white; }
            .certificate-container { box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="certificate-container">
        <img src="profile.png" alt="BM Insights Logo" class="cert-logo">
        
        <h1 class="cert-title">Certificate of Completion</h1>
        <p class="cert-subtitle">This is to proudly certify that</p>
        
        <div class="student-name" id="display-name">Student Name</div>
        
        <p class="cert-subtitle">has successfully completed the course</p>
        <div class="cert-course">YouTube Content Creation Mastery</div>
        
        <div class="cert-footer">
            <div class="signature-line">
                Date: <span id="cert-date"></span>
            </div>
            <div class="signature-line">
                Bemnet<br>BM INSIGHTS
            </div>
        </div>
    </div>

    <button class="print-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>

    <script>
        // 1. Get the name we saved from PayPal, or use a default if missing
        const savedName = localStorage.getItem('bm_student_name');
        if (savedName) {
            document.getElementById('display-name').innerText = savedName;
        }

        // 2. Set today's date automatically
        const today = new Date();
        const dateString = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('cert-date').innerText = dateString;
    </script>
</body>
</html>
